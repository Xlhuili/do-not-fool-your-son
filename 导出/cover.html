<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:1600px; height:2560px; overflow:hidden; }
  body {
    background:
      radial-gradient(900px 900px at 50% 33%, rgba(232,168,74,0.16), rgba(232,168,74,0) 70%),
      linear-gradient(180deg, #13242e 0%, #0e1b22 100%);
    font-family:"Songti SC","STSong",serif;
    color:#f3ece0;
    position:relative;
  }
  .frame {
    position:absolute; inset:70px;
    border:2px solid rgba(243,236,224,0.22);
  }
  .wrap {
    position:absolute; inset:0;
    display:flex; flex-direction:column; align-items:center;
    padding:200px 150px 150px;
  }
  .kicker {
    font-family:"PingFang SC","Heiti SC",sans-serif;
    font-size:40px; letter-spacing:0.5em; color:#e8a84a;
    margin-left:0.5em; font-weight:600;
  }
  /* 好奇的火花 */
  .spark {
    margin:120px 0 110px;
    width:130px; height:130px; position:relative;
  }
  .spark .core {
    position:absolute; inset:0; margin:auto; width:46px; height:46px; border-radius:50%;
    background:#f6c66a;
    box-shadow:0 0 40px 14px rgba(246,198,106,0.75), 0 0 120px 50px rgba(232,168,74,0.35);
  }
  .spark .ray {
    position:absolute; left:50%; top:50%; width:4px; height:54px;
    background:linear-gradient(#f6c66a, rgba(246,198,106,0));
    transform-origin:bottom center;
  }
  h1 {
    font-size:152px; line-height:1.18; font-weight:700; text-align:center;
    letter-spacing:0.04em;
  }
  h1 .hl { color:#f0b65a; }
  .subtitle {
    margin-top:80px;
    font-family:"PingFang SC","Heiti SC",sans-serif;
    font-size:50px; letter-spacing:0.18em; color:#cdbfa8; font-weight:400;
  }
  .rule { margin:90px 0 0; width:140px; height:3px; background:#e8a84a; opacity:.8; }
  .foundations {
    position:absolute; bottom:230px; left:0; right:0; text-align:center;
    font-family:"PingFang SC","Heiti SC",sans-serif;
    font-size:42px; letter-spacing:0.32em; color:#9fb0b8;
  }
  .tag {
    position:absolute; bottom:150px; left:0; right:0; text-align:center;
    font-family:"PingFang SC","Heiti SC",sans-serif;
    font-size:34px; letter-spacing:0.22em; color:#7d8f97;
  }
</style>
</head>
<body>
  <div class="frame"></div>
  <div class="wrap">
    <div class="kicker">证据驱动 · 育儿</div>
    <div class="spark">
      <div class="core"></div>
      <div class="ray" style="transform:translate(-50%,-100%) rotate(0deg)"></div>
      <div class="ray" style="transform:translate(-50%,-100%) rotate(45deg)"></div>
      <div class="ray" style="transform:translate(-50%,-100%) rotate(90deg)"></div>
      <div class="ray" style="transform:translate(-50%,-100%) rotate(135deg)"></div>
      <div class="ray" style="transform:translate(-50%,-100%) rotate(180deg)"></div>
      <div class="ray" style="transform:translate(-50%,-100%) rotate(225deg)"></div>
      <div class="ray" style="transform:translate(-50%,-100%) rotate(270deg)"></div>
      <div class="ray" style="transform:translate(-50%,-100%) rotate(315deg)"></div>
    </div>
    <h1>如何不让<br>自己的孩子<br><span class="hl">变傻</span></h1>
    <div class="subtitle">一本讲证据的育儿书</div>
    <div class="rule"></div>
  </div>
  <div class="foundations">好奇　专注　自主　思辨　更新</div>
  <div class="tag">孩子不是变傻的，是被教傻的</div>
</body>
</html>
